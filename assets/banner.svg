<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="50%" stop-color="#111c38"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#0066ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cc00ff" stop-opacity="0.8"/>
    </linearGradient>

    <style>
      .text-glow {
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 800;
        font-size: 36px;
        fill: #ffffff;
        text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
      }
      .binary {
        font-family: monospace;
        font-size: 14px;
        fill: #00ffcc;
        opacity: 0;
        animation: rain 4s linear infinite;
      }
      @keyframes rain {
        0% { transform: translateY(-20px); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(220px); opacity: 0; }
      }
      
      .pulse {
        animation: heartbeat 3s ease-in-out infinite;
      }
      @keyframes heartbeat {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.02); opacity: 1; }
        100% { transform: scale(1); opacity: 0.8; }
      }
      
      .wave {
        animation: shift 10s linear infinite;
      }
      @keyframes shift {
        from { stroke-dashoffset: 800; }
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <g>
    <text x="50" y="0" class="binary" style="animation-delay: 0s;">01001010</text>
    <text x="150" y="0" class="binary" style="animation-delay: 1.2s;">11010011</text>
    <text x="250" y="0" class="binary" style="animation-delay: 2.5s;">00110101</text>
    <text x="350" y="0" class="binary" style="animation-delay: 0.5s;">10101010</text>
    <text x="450" y="0" class="binary" style="animation-delay: 1.8s;">01100110</text>
    <text x="550" y="0" class="binary" style="animation-delay: 3.1s;">10011001</text>
    <text x="650" y="0" class="binary" style="animation-delay: 0.9s;">11100011</text>
    <text x="750" y="0" class="binary" style="animation-delay: 2.2s;">01010101</text>
  </g>

  <g class="pulse">
    <path d="M-100,100 C50,-50 150,250 300,100 C450,-50 550,250 700,100 C850,-50 950,250 1100,100" fill="none" stroke="url(#glow)" stroke-width="4" stroke-dasharray="100 20" class="wave" opacity="0.6"/>
    <path d="M-100,100 C50,250 150,-50 300,100 C450,250 550,-50 700,100 C850,250 950,-50 1100,100" fill="none" stroke="url(#glow)" stroke-width="2" stroke-dasharray="80 40" class="wave" opacity="0.4" style="animation-duration: 8s; animation-direction: reverse;"/>
  </g>
  
  <g transform="translate(400, 100)">
    <rect x="-350" y="-40" width="700" height="80" rx="10" fill="#0a0f1c" opacity="0.8"/>
    <rect x="-350" y="-40" width="700" height="80" rx="10" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.3"/>
    <text x="0" y="10" text-anchor="middle" class="text-glow">Bio-Digital Memory Architect</text>
    <text x="0" y="35" text-anchor="middle" font-family="monospace" font-size="12px" fill="#0066ff" opacity="0.9">A T G C : 0 1 0 1</text>
  </g>
</svg>
